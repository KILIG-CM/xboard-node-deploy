# Xboard Clash 订阅模板(满配最佳版 · 不分地区)
# proxies / proxy-groups 里的 proxies:[] 由 Xboard 面板自动填充全部节点。

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: 'off'
global-client-fingerprint: chrome
keep-alive-interval: 30

geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.pool.ntp.org"
    - "*.ntp.org.cn"
    - "time.*.com"
    - "ntp.*.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
  default-nameserver: [223.5.5.5, 119.29.29.29]
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  nameserver-policy:
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn,google,youtube,telegram,netflix,disney,openai,spotify":
      - https://cloudflare-dns.com/dns-query
      - https://dns.google/dns-query

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443]
    HTTP:
      ports: [80, 8080-8880]
  override-destination: false
  skip-domain:
    - "+.push.apple.com"
    - "+.wechat.com"

tun:
  enable: true
  stack: mixed
  mtu: 1500
  dns-hijack: ["any:53"]
  auto-route: true
  auto-detect-interface: true

proxies: []

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: [♻️ 自动选择, 🎯 全球直连]

  - name: ♻️ 自动选择
    type: url-test
    proxies: []
    url: http://www.gstatic.com/generate_204
    interval: 120
    tolerance: 50
    lazy: true

  - name: 📺 流媒体
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, 🎯 全球直连]

  - name: 🤖 AI
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择]

  - name: 📲 Telegram
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择]

  - name: 🍎 苹果服务
    type: select
    proxies: [🎯 全球直连, 🚀 节点选择]

  - name: 🛑 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🎯 全球直连
    type: select
    proxies: [DIRECT]

  - name: 🐟 漏网之鱼
    type: select
    proxies: [🚀 节点选择, 🎯 全球直连]

rules:
  # —— 面板 / 订阅直连 ——
  - DOMAIN,panel.kiligt.top,DIRECT
  # —— 内网 / 回环拦截 ——
  - IP-CIDR,127.0.0.0/8,REJECT,no-resolve
  - IP-CIDR,10.0.0.0/8,REJECT,no-resolve
  - IP-CIDR,172.16.0.0/12,REJECT,no-resolve
  - IP-CIDR,192.168.0.0/16,REJECT,no-resolve
  - IP-CIDR,169.254.0.0/16,REJECT,no-resolve
  - GEOSITE,private,🎯 全球直连
  - GEOIP,private,🎯 全球直连,no-resolve
  # —— 防滥用:邮件端口 + BT ——
  - DST-PORT,25,REJECT
  - DST-PORT,465,REJECT
  - DST-PORT,587,REJECT
  - DST-PORT,6881-6999,REJECT
  - DOMAIN-KEYWORD,torrent,REJECT
  - DOMAIN-KEYWORD,tracker,REJECT
  - DOMAIN-KEYWORD,magnet,REJECT
  - DOMAIN-KEYWORD,xunlei,REJECT
  # —— 广告拦截 ——
  - GEOSITE,category-ads-all,🛑 广告拦截
  # —— 分应用分流 ——
  - GEOSITE,openai,🤖 AI
  - DOMAIN-SUFFIX,anthropic.com,🤖 AI
  - DOMAIN-SUFFIX,claude.ai,🤖 AI
  - DOMAIN-KEYWORD,gemini,🤖 AI
  - GEOSITE,telegram,📲 Telegram
  - GEOIP,telegram,📲 Telegram,no-resolve
  - GEOSITE,netflix,📺 流媒体
  - GEOSITE,disney,📺 流媒体
  - GEOSITE,youtube,📺 流媒体
  - GEOSITE,spotify,📺 流媒体
  - GEOSITE,apple,🍎 苹果服务
  # —— 国内直连 / 国外走代理 ——
  - GEOSITE,cn,🎯 全球直连
  - GEOSITE,geolocation-!cn,🚀 节点选择
  - GEOIP,cn,🎯 全球直连,no-resolve
  # —— 兜底 ——
  - MATCH,🐟 漏网之鱼
